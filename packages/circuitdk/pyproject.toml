[project]
name = "circuitdk"
version = "0.1.1"
description = "Code-first circuit design and KiCad reconciliation toolkit"
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
requires-python = ">=3.13"
keywords = ["circuit", "eda", "kicad", "schematic"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Electronic Design Automation (EDA)",
]
dependencies = [
    "circuitdk-lossless-sexpr>=0.1.0,<0.2.0",
    "typer>=0.16.0",
]

[project.urls]
Homepage = "https://github.com/td2sk/circuitdk"
Repository = "https://github.com/td2sk/circuitdk"
Documentation = "https://github.com/td2sk/circuitdk/tree/main/docs"
Issues = "https://github.com/td2sk/circuitdk/issues"

[project.scripts]
circuit = "circuitdk.cli:app"
circuitdk = "circuitdk.cli:app"

[tool.uv.sources]
circuitdk-lossless-sexpr = { workspace = true }

[build-system]
requires = ["uv_build>=0.11.7,<0.12.0"]
build-backend = "uv_build"
